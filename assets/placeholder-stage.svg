  </defs>
  <rect width="900" height="650" fill="url(#bg)"/>
  <rect x="80" y="70" width="740" height="510" rx="36" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="120,120 420,120 240,480" fill="url(#beam)"/>
  <polygon points="780,140 520,140 660,520" fill="url(#beam)"/>
  <circle cx="220" cy="140" r="28" fill="#ffd27f" fill-opacity="0.6"/>
